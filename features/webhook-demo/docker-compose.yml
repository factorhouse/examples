x-common-environment: &kafka_broker_common_env_vars
  KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_DOCKER_INTERNAL:PLAINTEXT,LISTENER_DOCKER_EXTERNAL:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_DOCKER_INTERNAL
  KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
  KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
  KAFKA_NUM_PARTITIONS: "3"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
  KAFKA_LOG_CLEANUP_POLICY: "delete"
  KAFKA_LOG_RETENTION_BYTES: "524288000" # 500 MB
  KAFKA_LOG_SEGMENT_BYTES: "67108864" # 64 MB segments
  KAFKA_LOG_RETENTION_MS: "86400000" # 1 day

services:
  kpow-slack:
    image: factorhouse/kpow:latest
    container_name: kpow-slack
    pull_policy: always
    restart: always
    ports:
      - "3000:3000"
    networks:
      - factorhouse
    environment:
      ENVIRONMENT_NAME: Webhook Slack Demo
      BOOTSTRAP: kafka-1:19092,kafka-2:19093,kafka-3:19094
      JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true -Djava.security.auth.login.config=/etc/kpow/jaas/hash-jaas.conf"
      AUTH_PROVIDER_TYPE: jetty
      RBAC_CONFIGURATION_FILE: /etc/kpow/rbac/hash-rbac.yml
      WEBHOOK_PROVIDER: slack
      WEBHOOK_URL: "https://hooks.slack.com/services/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"
      # WEBHOOK_URL: $SLACK_WEBHOOK_URL
    env_file:
      - $KPOW_LICENSE
    volumes:
      - ./resources/jaas:/etc/kpow/jaas
      - ./resources/rbac:/etc/kpow/rbac

  kpow-teams:
    image: factorhouse/kpow:latest
    container_name: kpow-teams
    pull_policy: always
    restart: always
    ports:
      - "4000:3000"
    networks:
      - factorhouse
    environment:
      ENVIRONMENT_NAME: Webhook Teams Demo
      BOOTSTRAP: kafka-1:19092,kafka-2:19093,kafka-3:19094
      JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true -Djava.security.auth.login.config=/etc/kpow/jaas/hash-jaas.conf"
      AUTH_PROVIDER_TYPE: jetty
      RBAC_CONFIGURATION_FILE: /etc/kpow/rbac/hash-rbac.yml
      WEBHOOK_PROVIDER: teams
      WEBHOOK_URL: "https://prod-00.australiaeast.logic.azure.com:443/workflows/5ce1b37fb42c46d9bbb042c2ca839330/triggers/manual/paths/invoke?api-version=2016-06-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=e2OkoFU9Pnuv0RZ-9x8s8dvWSq7cGuqUj2n3vlxNY70"
      # WEBHOOK_URL: $TEAMS_WEBHOOK_URL
    env_file:
      - $KPOW_LICENSE
    volumes:
      - ./resources/jaas:/etc/kpow/jaas
      - ./resources/rbac:/etc/kpow/rbac

  kpow-generic:
    image: factorhouse/kpow:latest
    container_name: kpow-generic
    pull_policy: always
    restart: always
    ports:
      - "5000:3000"
    networks:
      - factorhouse
    environment:
      ENVIRONMENT_NAME: Webhook Generic Demo
      BOOTSTRAP: kafka-1:19092,kafka-2:19093,kafka-3:19094
      JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true -Djava.security.auth.login.config=/etc/kpow/jaas/hash-jaas.conf"
      AUTH_PROVIDER_TYPE: jetty
      RBAC_CONFIGURATION_FILE: /etc/kpow/rbac/hash-rbac.yml
      WEBHOOK_PROVIDER: generic
      WEBHOOK_URL: "http://localhost:9000"
      # WEBHOOK_URL: $GENERIC_WEBHOOK_URL
    env_file:
      - $KPOW_LICENSE
    volumes:
      - ./resources/jaas:/etc/kpow/jaas
      - ./resources/rbac:/etc/kpow/rbac

  webhook-server:
    image: webhook-demo
    build:
      context: .
    container_name: webhook-server
    pull_policy: never
    command: ["flask", "run", "--host=0.0.0.0", "--port=9000"]
    ports:
      - "9000:9000"
    networks:
      - factorhouse
    environment:
      FLASK_APP: server.py
      FLASK_DEBUG: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./server.py:/app/server.py

  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - factorhouse
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka-1:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-1
    ports:
      - "9092:9092"
    networks:
      - factorhouse
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER_INTERNAL://kafka-1:19092,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092
      <<: *kafka_broker_common_env_vars
    depends_on:
      - zookeeper

  kafka-2:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-2
    ports:
      - "9093:9093"
    networks:
      - factorhouse
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER_INTERNAL://kafka-2:19093,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9093
      <<: *kafka_broker_common_env_vars
    depends_on:
      - zookeeper

  kafka-3:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-3
    ports:
      - "9094:9094"
    networks:
      - factorhouse
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER_INTERNAL://kafka-3:19094,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9094
      <<: *kafka_broker_common_env_vars
    depends_on:
      - zookeeper

networks:
  factorhouse:
    name: factorhouse
