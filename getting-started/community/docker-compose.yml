# Factor House Community Quick Start with OSS Kafka and Flink
# This docker-compose spins up Kpow / Flex connected to a local Kafka / Flink cluster
#
# Get started:
# Kpow:
# docker compose --profile kpow up -d
# Access Kpow at: http://localhost:3000
#
# Flex:
# docker compose --profile flex up -d
# Access Flex at: http://localhost:3001
#
# Kpow + Flex:
# docker compose --profile kpow --profile flex up -d
# Access Kpow at: http://localhost:3000
# Access Flex at: http://localhost:3001
####################################################################################################
# DO NOT USE IN PRODUCTION
#
# For production deployments, contact us for a free trial:
# Kpow: https://factorhouse.io/products/kpow
# Flex: https://factorhouse.io/products/flex
####################################################################################################

services:
  # Kpow Community Edition - Kafka monitoring and management UI
  # https://docs.factorhouse.io/kpow/
  kpow-ce:
    image: factorhouse/kpow-ce:latest
    container_name: kpow-ce
    pull_policy: always
    ports:
      - "3000:3000"
    networks:
      - factorhouse
    profiles:
      - kpow
    environment:
      # Environment name (displayed in Kpow UI)
      ENVIRONMENT_NAME: "Welcome to Kpow"

      # You can replace the following with the boostrap URL of your own Kafka cluster.
      BOOTSTRAP: "broker:29092"

      # Your license details. Don't share these!
      LICENSE_ID: "<LICENSE_ID>"
      LICENSE_CODE: "<LICENSE_CODE>"
      LICENSEE: "<LICENSEE>"
      LICENSE_EXPIRY: "<LICENSE_EXPIRY>"
      LICENSE_SIGNATURE: "<LICENSE_SIGNATURE>"
    depends_on:
      broker:
        condition: service_healthy
    mem_limit: 2g
    restart: unless-stopped

  # Apache Kafka in KRaft Mode
  broker:
    image: apache/kafka:4.1.1
    container_name: broker
    ports:
      - "9092:9092"
    networks:
      - factorhouse
    profiles:
      - kpow
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:9093"
      KAFKA_LISTENERS: "PLAINTEXT://broker:29092,CONTROLLER://broker:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Kafka Producer
  producer:
    image: apache/kafka:4.1.1
    container_name: producer
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - factorhouse
    profiles:
      - kpow
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Wait a few seconds for the broker to be fully ready after healthcheck
        sleep 5

        echo "Creating topic 'getting-started'..."
        /opt/kafka/bin/kafka-topics.sh --create --topic getting-started --bootstrap-server broker:29092 --partitions 1 --replication-factor 1
        echo "Topic created."

        id=0
        echo "Starting to produce messages..."
        while true; do
          id=$$(($$id+1))
          
          random_string=$$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 12 | head -n 1)

          message=$$(printf '{"id": %d, "message": "%s"}' "$$id" "$$random_string")
          
          echo "$$message" | /opt/kafka/bin/kafka-console-producer.sh --topic getting-started --bootstrap-server broker:29092
          
          echo "Produced: $$message"
          
          sleep 1
        done

  # Flex Community Edition - Flink monitoring and management UI
  # https://docs.factorhouse.io/flex/
  flex-ce:
    image: factorhouse/flex-ce:latest
    container_name: flex-ce
    pull_policy: always
    ports:
      - "3001:3000"
    networks:
      - factorhouse
    profiles:
      - flex
    environment:
      # Environment name (displayed in Flex UI)
      FLINK_ENVIRONMENT_NAME: "Welcome to Flex"

      # You can replace the following with the boostrap URL of your own Flink cluster.
      FLINK_REST_URL: "http://flink:8081"

      # Your license details. Don't share these!
      LICENSE_ID: "<LICENSE_ID>"
      LICENSE_CODE: "<LICENSE_CODE>"
      LICENSEE: "<LICENSEE>"
      LICENSE_EXPIRY: "<LICENSE_EXPIRY>"
      LICENSE_SIGNATURE: "<LICENSE_SIGNATURE>"
    depends_on:
      flink:
        condition: service_healthy
    mem_limit: 2g
    restart: unless-stopped

  # Standalone Flink Cluster
  flink:
    image: flink:1.20.1
    container_name: flink
    networks:
      - factorhouse
    profiles:
      - flex
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: localhost
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        taskmanager.memory.process.size: 1024m
    command:
      - bash
      - -c
      - |
        set -e

        # Start Flink cluster (JobManager + TaskManager)
        /opt/flink/bin/start-cluster.sh

        # Wait until REST API is ready
        echo "Waiting for JobManager..."
        until curl -sf http://localhost:8081/overview > /dev/null; do
          sleep 1
        done

        # Submit the streaming example job
        echo "Submitting TopSpeedWindowing..."
        /opt/flink/bin/flink run -d /opt/flink/examples/streaming/TopSpeedWindowing.jar

        # Keep container alive
        tail -f /dev/null
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/config"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  factorhouse:
    name: factorhouse
    driver: bridge
