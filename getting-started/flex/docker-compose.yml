# Flex Quick Start with OSS Flink
# This docker-compose spins up Flex connected to a local Flink cluster
#
# Get started: docker compose up -d
# Access Kpow at: http://localhost:3000
#
####################################################################################################
# DO NOT USE IN PRODUCTION
#
# This is a getting-started configuration. For production deployments, please see:
# https://docs.factorhouse.io/flex/installation/
####################################################################################################

services:
  # Flex Enterprise Edition - Flink monitoring and management UI
  # https://docs.factorhouse.io/flex/
  flex:
    image: factorhouse/flex:latest
    container_name: flex
    pull_policy: always
    ports:
      - "3000:3000"
    networks:
      - factorhouse
    environment:
      # Environment name (displayed in Flex UI)
      FLINK_ENVIRONMENT_NAME: "Welcome to Flex"

      # You can replace the following with the boostrap URL of your own Kafka cluster.
      FLINK_REST_URL: "http://flink:8081"

      # Your license details. Don't share these!
      LICENSE_ID: "<LICENSE_ID>"
      LICENSE_CODE: "<LICENSE_CODE>"
      LICENSEE: "<LICENSEE>"
      LICENSE_EXPIRY: "<LICENSE_EXPIRY>"
      LICENSE_SIGNATURE: "<LICENSE_SIGNATURE>"

      # Feature flags via Simple Access Control.
      # See the full list of flags at https://docs.factorhouse.io/flex/authorization/simple-access-control
      ALLOW_FLINK_SUBMIT: "true" # Allow users to submit+upload Flink jobs
      ALLOW_FLINK_JOB_TERMINATE: "true" # Allow users to terminate Flink jobs
      ALLOW_FLINK_JAR_DELETE: "true" # Allow users to delete Flink JARs
      ALLOW_FLINK_JOB_EDIT: "true" # Allow users to edit Flink jobs (configuration, snapshotting etc)

    depends_on:
      flink:
        condition: service_healthy
    mem_limit: 2g
    restart: unless-stopped

  # Standalone Flink Cluster
  flink:
    image: flink:1.20.1
    container_name: flink
    networks:
      - factorhouse
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: localhost
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        taskmanager.memory.process.size: 1024m
    command:
      - bash
      - -c
      - |
        set -e

        # Start Flink cluster (JobManager + TaskManager)
        /opt/flink/bin/start-cluster.sh

        # Wait until REST API is ready
        echo "Waiting for JobManager..."
        until curl -sf http://localhost:8081/overview > /dev/null; do
          sleep 1
        done

        # Submit the streaming example job
        echo "Submitting TopSpeedWindowing..."
        /opt/flink/bin/flink run -d /opt/flink/examples/streaming/TopSpeedWindowing.jar

        # Keep container alive
        tail -f /dev/null
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/config"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  factorhouse:
    name: factorhouse
    driver: bridge
